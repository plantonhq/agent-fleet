apiVersion: agentic.stigmer.ai/v1
kind: McpServer
metadata:
  name: planton
  org: default
spec:
  description: >
    Connects AI agents to the Planton platform via gRPC, exposing 100 tools
    that cover the full product surface: cloud resource lifecycle (create,
    update, delete, destroy, lock management, env var extraction) across 17
    cloud providers and 362 resource kinds; stack-job observability and
    control; InfraChart template browsing; InfraProject and InfraPipeline
    lifecycle management; dependency-graph analysis and blast-radius
    assessment; Config Manager for plaintext variables and encrypted secrets
    with full version history; audit and version history; context discovery
    (organizations and environments); presets and catalog browsing; service
    lifecycle and CI/CD pipelines; service variable/secret groups; DNS
    domains; and Tekton pipeline and task management. Two read-only MCP
    resources enable schema-driven discovery before any tool call:
    cloud-resource-kinds://catalog and cloud-resource-schema://{kind}.
  stdio:
    command: go
    args:
      - run
      - github.com/plantonhq/mcp-server-planton/cmd/mcp-server-planton@v1.0.14
  env_spec:
    data:
      PLANTON_API_KEY:
        description: >
          Planton API key used to authenticate all gRPC calls to the Planton
          backend. Required when the transport is stdio (the default). Generate
          one at Console > Profile > API Keys > Create Key.
        is_secret: true
      PLANTON_ENVIRONMENT:
        description: >
          Target Planton backend environment. Accepted values: live (default,
          routes to api.live.planton.ai:443), test (routes to
          api.test.planton.cloud:443), or local (routes to localhost:8080).
          Omit to use the live production environment.
        is_secret: false
      PLANTON_APIS_GRPC_ENDPOINT:
        description: >
          Explicit gRPC dial target override (e.g. "api.live.planton.ai:443").
          Takes precedence over PLANTON_ENVIRONMENT when set. Only needed for
          custom or self-hosted Planton deployments; omit for standard
          cloud environments.
        is_secret: false
      PLANTON_MCP_LOG_LEVEL:
        description: >
          Minimum log severity emitted by the server process. Accepted values:
          debug, info (default), warn, error. Set to debug to trace every
          gRPC call during troubleshooting.
        is_secret: false
      PLANTON_MCP_LOG_FORMAT:
        description: >
          Structured log encoding format. Accepted values: text (default,
          human-readable) or json (machine-readable; recommended for log
          aggregation pipelines).
        is_secret: false

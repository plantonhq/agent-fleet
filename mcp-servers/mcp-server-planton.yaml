apiVersion: agentic.stigmer.ai/v1
kind: McpServer
metadata:
  name: mcp-server-planton
  org: default
spec:
  description: >
    Stateless protocol bridge that connects AI agents to the Planton cloud
    platform via gRPC (TLS on :443). Exposes 100 MCP tools spanning the full
    Planton product surface across 17 cloud providers and 362 resource kinds.

    Tool categories:
    - Cloud Resource Lifecycle: create, update, delete, destroy, lock/unlock,
      and extract env vars for any of the 362 supported kinds
      (AWS, GCP, Azure, Kubernetes, AliCloud, DigitalOcean, Civo, Cloudflare,
      Confluent, Auth0, OpenFGA, Snowflake, MongoDB Atlas, Hetzner Cloud,
      OCI, OpenStack, Scaleway)
    - Stack Jobs: observe provisioning outcomes, retry failures, cancel or
      approve running jobs, pre-validate prerequisites
    - InfraChart Templates: browse and preview reusable infrastructure chart
      templates
    - InfraProject Lifecycle: create and manage infrastructure projects sourced
      from charts or Git repositories
    - InfraPipeline Monitoring & Control: track deployment pipelines, trigger
      runs, resolve manual gates
    - Dependency Graph: explore resource topology, trace dependencies and
      dependents, analyze blast radius
    - Config Manager: manage plaintext variables and encrypted secrets with
      full version history
    - Audit & Version History: paginated change history and unified diffs for
      any platform resource
    - Context Discovery: list organizations and environments
    - Presets & Catalog: find pre-configured templates and browse deployable
      component types with their IaC modules
    - Service Lifecycle: search, create, update, and delete services; manage
      Git webhook connections
    - Service CI/CD Pipelines: observe build-and-deploy runs, trigger and
      cancel pipelines, resolve manual gates, read and write pipeline YAML
    - Service Variable Groups: manage named collections of plaintext
      environment variables; upsert/delete individual entries; resolve and
      batch-transform $variables-group/ references
    - Service Secrets Groups: manage named collections of encrypted secrets;
      upsert/delete individual entries; resolve and batch-transform
      $secrets-group/ references
    - DNS Domains: register and manage custom domain names for service ingress
    - Tekton Pipelines & Tasks: manage reusable Tekton pipeline and task step
      templates referenced by services

    Two read-only MCP resources support schema-aware tool calls:
    - cloud-resource-kinds://catalog — all 362 supported kinds grouped by
      cloud provider
    - cloud-resource-schema://{kind} — full JSON schema for a specific kind
      including field types, validation rules, and defaults

    Every tool call opens a short-lived gRPC connection to the Planton
    backend, executes the RPC, and returns the result. No state is persisted
    locally.

  stdio:
    command: go
    args:
      - run
      - github.com/plantonhq/mcp-server-planton/cmd/mcp-server-planton@v1.0.15

  env_spec:
    data:
      PLANTON_API_KEY:
        description: >
          Planton API key used to authenticate all gRPC calls to the Planton
          backend. Required in stdio transport mode. Generate one at:
          Console > Profile > API Keys > Create Key.
        is_secret: true

      PLANTON_ENVIRONMENT:
        description: >
          Target Planton backend environment. Accepted values: live (default,
          routes to api.live.planton.ai:443), test (routes to
          api.test.planton.cloud:443), or local (routes to localhost:8080).
          Omit to use the live production environment.
        is_secret: false

      PLANTON_APIS_GRPC_ENDPOINT:
        description: >
          Explicit gRPC dial target override, e.g. "api.live.planton.ai:443".
          Takes precedence over PLANTON_ENVIRONMENT when set. Only needed for
          custom or self-hosted Planton deployments; omit for standard cloud
          environments. Connections to :443 automatically use TLS.
        is_secret: false

      PLANTON_MCP_LOG_LEVEL:
        description: >
          Minimum log severity emitted by the server process. Accepted values:
          debug, info (default), warn, error. Set to debug to trace every gRPC
          call during troubleshooting.
        is_secret: false

      PLANTON_MCP_LOG_FORMAT:
        description: >
          Structured log encoding format. Accepted values: text (default,
          human-readable) or json (machine-readable, recommended for log
          aggregation pipelines).
        is_secret: false

  default_tool_approvals:

    # ── Cloud Resource Lifecycle ──────────────────────────────────────
    - tool_name: apply_cloud_resource
      message: "Create or update cloud resource of kind {{args.cloud_object.kind}} named {{args.cloud_object.metadata.name}} in org {{args.cloud_object.metadata.org}}"
    - tool_name: delete_cloud_resource
      message: "Delete cloud resource record {{args.kind}} {{args.slug}} in org {{args.org}} env {{args.env}}"
    - tool_name: destroy_cloud_resource
      message: "Destroy infrastructure for {{args.kind}} {{args.slug}} in org {{args.org}} env {{args.env}}"
    - tool_name: purge_cloud_resource
      message: "Purge (destroy infra + delete record) {{args.kind}} {{args.slug}} in org {{args.org}} env {{args.env}}"
    - tool_name: rename_cloud_resource
      message: "Rename {{args.kind}} {{args.slug}} to {{args.new_name}} in org {{args.org}}"
    - tool_name: remove_cloud_resource_locks
      message: "Remove all locks for {{args.kind}} {{args.slug}} in org {{args.org}} env {{args.env}}"

    # ── Connection Management ─────────────────────────────────────────
    - tool_name: apply_connection
      message: "Create or update connection of kind {{args.connection_object.kind}} in org {{args.connection_object.metadata.org}}"
    - tool_name: apply_default_provider_connection
      message: "Create or update default provider connection"
    - tool_name: apply_provider_connection_authorization
      message: "Create or update provider connection authorization"
    - tool_name: apply_runner_registration
      message: "Create or update runner registration"
    - tool_name: apply_default_runner_binding
      message: "Create or update default runner binding"
    - tool_name: delete_connection
      message: "Delete connection {{args.id}} of kind {{args.kind}}"
    - tool_name: delete_default_provider_connection
      message: "Delete default provider connection {{args.id}}"
    - tool_name: delete_default_runner_binding
      message: "Delete default runner binding {{args.id}}"
    - tool_name: delete_default_runner_binding_by_selector
      message: "Delete default runner binding for {{args.kind}} selector {{args.id}}"
    - tool_name: delete_provider_connection_authorization
      message: "Delete provider connection authorization for org {{args.org}} provider {{args.provider}}"
    - tool_name: delete_runner_registration
      message: "Delete runner registration {{args.id}}"
    - tool_name: delete_env_default_provider_connection
      message: "Delete env-level default provider connection for {{args.provider}} in env {{args.environment}} org {{args.org}}"
    - tool_name: delete_org_default_provider_connection
      message: "Delete org-level default provider connection for {{args.provider}} in org {{args.org}}"
    - tool_name: sync_provider_connection_authorization
      message: "Sync authorization state for provider {{args.provider}} connection {{args.connection}} in org {{args.org}}"
    - tool_name: configure_github_webhook
      message: "Configure webhook on GitHub repo {{args.repo_name}} via connection {{args.github_connection_id}}"
    - tool_name: remove_github_webhook
      message: "Remove webhook from GitHub repo {{args.repo_name}} via connection {{args.github_connection_id}}"
    - tool_name: generate_runner_credentials
      message: "Generate initial credentials for runner registration {{args.id}}"
    - tool_name: regenerate_runner_credentials
      message: "Rotate and regenerate credentials for runner registration {{args.id}}"

    # ── Stack-Job Control ─────────────────────────────────────────────
    - tool_name: cancel_stack_job
      message: "Cancel running stack job {{args.id}}"
    - tool_name: resume_stack_job
      message: "Approve and resume stack job {{args.id}} awaiting approval"
    - tool_name: rerun_stack_job
      message: "Re-run previously executed stack job {{args.id}}"

    # ── InfraProject Lifecycle ────────────────────────────────────────
    - tool_name: apply_infra_project
      message: "Create or update infra project {{args.infra_project.metadata.name}} in org {{args.infra_project.metadata.org}}"
    - tool_name: delete_infra_project
      message: "Delete infra project {{args.slug}} in org {{args.org}}"
    - tool_name: undeploy_infra_project
      message: "Tear down all resources deployed by infra project {{args.slug}} in org {{args.org}}"

    # ── InfraPipeline Control ─────────────────────────────────────────
    - tool_name: cancel_infra_pipeline
      message: "Cancel running infra pipeline {{args.id}}"
    - tool_name: delete_infra_pipeline
      message: "Delete infra pipeline record {{args.id}}"
    - tool_name: run_infra_pipeline
      message: "Trigger infra pipeline run for project {{args.infra_project_id}} at commit {{args.commit_sha}}"
    - tool_name: resolve_infra_pipeline_env_gate
      message: "{{args.decision}} manual gate for env {{args.env}} in infra pipeline {{args.infra_pipeline_id}}"
    - tool_name: resolve_infra_pipeline_node_gate
      message: "{{args.decision}} manual gate for node {{args.node_id}} env {{args.env}} in infra pipeline {{args.infra_pipeline_id}}"

    # ── Service Lifecycle ─────────────────────────────────────────────
    - tool_name: apply_service
      message: "Create or update service {{args.service.metadata.name}} in org {{args.service.metadata.org}}"
    - tool_name: delete_service
      message: "Delete service {{args.slug}} in org {{args.org}}"
    - tool_name: configure_service_webhook
      message: "Configure Git webhook for service {{args.slug}} in org {{args.org}}"
    - tool_name: disconnect_service_git_repo
      message: "Disconnect Git repo from service {{args.slug}} in org {{args.org}}"

    # ── Service CI/CD Pipelines ───────────────────────────────────────
    - tool_name: cancel_pipeline
      message: "Cancel running CI/CD pipeline {{args.id}}"
    - tool_name: run_pipeline
      message: "Trigger CI/CD pipeline for service {{args.service_id}} on branch {{args.branch}}"
    - tool_name: rerun_pipeline
      message: "Re-run CI/CD pipeline {{args.id}}"
    - tool_name: resolve_pipeline_gate
      message: "{{args.decision}} manual gate for task {{args.deployment_task_name}} in pipeline {{args.pipeline_id}}"
    - tool_name: update_pipeline_file
      message: "Update pipeline file {{args.path}} on branch {{args.branch}} for service {{args.service_id}}"

    # ── Config Manager — Variables ────────────────────────────────────
    - tool_name: apply_variable
      message: "Create or update variable {{args.name}} in org {{args.org}} scope {{args.scope}}"
    - tool_name: apply_variable_group
      message: "Create or update variable group"
    - tool_name: apply_variables_group
      message: "Create or update variables group {{args.variables_group.metadata.name}} in org {{args.variables_group.metadata.org}}"
    - tool_name: delete_variable
      message: "Delete variable {{args.entry_name}} from group {{args.group_slug}} in org {{args.org}}"
    - tool_name: delete_variable_group
      message: "Delete variable group {{args.slug}} in org {{args.org}}"
    - tool_name: delete_variable_group_entry
      message: "Delete entry {{args.entry_name}} from variable group {{args.group_id}}"
    - tool_name: delete_variables_group
      message: "Delete variables group {{args.slug}} in org {{args.org}}"
    - tool_name: upsert_variable
      message: "Upsert variable {{args.entry.name}} in group {{args.group_slug}} org {{args.org}}"
    - tool_name: upsert_variable_group_entry
      message: "Upsert entry {{args.name}} in variable group {{args.group_id}}"
    - tool_name: refresh_all_variable_group_entries
      message: "Refresh all entries from external sources in variable group {{args.group_id}}"
    - tool_name: refresh_variable_group_entry
      message: "Refresh entry {{args.entry_name}} from external source in variable group {{args.group_id}}"

    # ── Config Manager — Secrets ──────────────────────────────────────
    - tool_name: apply_secret
      message: "Create or update secret {{args.name}} in org {{args.org}} scope {{args.scope}}"
    - tool_name: apply_secret_backend
      message: "Create or update secret backend"
    - tool_name: apply_secrets_group
      message: "Create or update secrets group {{args.secrets_group.metadata.name}} in org {{args.secrets_group.metadata.org}}"
    - tool_name: create_secret_version
      message: "Store new secret version for secret {{args.secret_id}}"
    - tool_name: delete_secret
      message: "Delete secret {{args.entry_name}} from group {{args.group_slug}} in org {{args.org}}"
    - tool_name: delete_secret_backend
      message: "Delete secret backend {{args.slug}} in org {{args.org}}"
    - tool_name: delete_secrets_group
      message: "Delete secrets group {{args.slug}} in org {{args.org}}"
    - tool_name: upsert_secret
      message: "Upsert secret {{args.entry.name}} in group {{args.group_slug}} org {{args.org}}"

    # ── DNS Domains ───────────────────────────────────────────────────
    - tool_name: apply_dns_domain
      message: "Create or update DNS domain {{args.dns_domain.metadata.name}} in org {{args.dns_domain.metadata.org}}"
    - tool_name: delete_dns_domain
      message: "Delete DNS domain {{args.slug}} in org {{args.org}}"

    # ── Tekton Pipelines & Tasks ──────────────────────────────────────
    - tool_name: apply_tekton_pipeline
      message: "Create or update Tekton pipeline {{args.tekton_pipeline.metadata.name}} in org {{args.tekton_pipeline.metadata.org}}"
    - tool_name: apply_tekton_task
      message: "Create or update Tekton task {{args.tekton_task.metadata.name}} in org {{args.tekton_task.metadata.org}}"
    - tool_name: delete_tekton_pipeline
      message: "Delete Tekton pipeline {{args.slug}} in org {{args.org}}"
    - tool_name: delete_tekton_task
      message: "Delete Tekton task {{args.slug}} in org {{args.org}}"

    # ── Organization & Environment Management ─────────────────────────
    - tool_name: create_organization
      message: "Create organization {{args.name}} (slug: {{args.slug}})"
    - tool_name: update_organization
      message: "Update organization {{args.org_id}}"
    - tool_name: delete_organization
      message: "Delete organization {{args.org_id}}"
    - tool_name: create_environment
      message: "Create environment {{args.name}} (slug: {{args.slug}}) in org {{args.org}}"
    - tool_name: update_environment
      message: "Update environment {{args.env_id}}"
    - tool_name: delete_environment
      message: "Delete environment {{args.env_id}}"

    # ── IAM & Access Control ──────────────────────────────────────────
    - tool_name: create_iam_policy
      message: "Grant {{args.relation}} on {{args.resource_kind}} {{args.resource_id}} to {{args.principal_kind}} {{args.principal_id}}"
    - tool_name: delete_iam_policy
      message: "Revoke {{args.relation}} on {{args.resource_kind}} {{args.resource_id}} from {{args.principal_kind}} {{args.principal_id}}"
    - tool_name: upsert_iam_policies
      message: "Sync IAM relations for {{args.principal_kind}} {{args.principal_id}} on {{args.resource_kind}} {{args.resource_id}}"
    - tool_name: invite_member
      message: "Invite {{args.email}} to org {{args.org}}"
    - tool_name: revoke_org_access
      message: "Revoke all access for account {{args.identity_account_id}} from organization {{args.organization_id}}"
    - tool_name: create_team
      message: "Create team {{args.name}} in org {{args.org}}"
    - tool_name: update_team
      message: "Update team {{args.team_id}}"
    - tool_name: delete_team
      message: "Delete team {{args.team_id}}"
    - tool_name: create_service_account
      message: "Create service account {{args.display_name}} in org {{args.org}}"
    - tool_name: update_service_account
      message: "Update service account {{args.id}}"
    - tool_name: delete_service_account
      message: "Delete service account {{args.id}} (cascades: keys revoked, auth tuples removed)"
    - tool_name: create_service_account_key
      message: "Generate API key for service account {{args.service_account_id}}"
    - tool_name: revoke_service_account_key
      message: "Revoke API key {{args.api_key_id}} from service account {{args.service_account_id}}"
    - tool_name: create_api_key
      message: "Create API key {{args.name}} for the authenticated user"
    - tool_name: delete_api_key
      message: "Permanently revoke and delete API key {{args.api_key_id}}"

    # ── IaC, Flow Control & Promotion Policies ────────────────────────
    - tool_name: apply_iac_provisioner_mapping
      message: "Create or update IaC provisioner mapping"
    - tool_name: delete_iac_provisioner_mapping
      message: "Delete IaC provisioner mapping {{args.id}}"
    - tool_name: apply_flow_control_policy
      message: "Create or update flow control policy {{args.name}} for {{args.selector_kind}} {{args.selector_id}}"
    - tool_name: delete_flow_control_policy
      message: "Delete flow control policy {{args.policy_id}}"
    - tool_name: apply_promotion_policy
      message: "Create or update promotion policy {{args.name}} for {{args.selector_kind}} {{args.selector_id}}"
    - tool_name: delete_promotion_policy
      message: "Delete promotion policy {{args.policy_id}}"

    # ── Kubernetes Object Management ──────────────────────────────────
    - tool_name: delete_kubernetes_object
      message: "Delete Kubernetes {{args.kind}} {{args.name}} in namespace {{args.namespace}}"
    - tool_name: update_kubernetes_object
      message: "Update Kubernetes object in namespace {{args.namespace}} via connection {{args.connection}}"
